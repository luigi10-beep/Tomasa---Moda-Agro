name = "tomasa-workers"
main = "src/index.ts"
compatibility_date = "2024-03-01"

# D1 Database binding
# Binding name: db_binding (padrão do projeto conforme requirements.md)
# Acesso no código: env.db_binding.prepare()
[[d1_databases]]
binding = "db_binding"
database_name = "tomasa-db"
database_id = "daeea588-675c-4aaa-9f7b-7b0a803c0d5e"

# R2 Bucket binding
# Binding name: r2_binding (padrão do projeto conforme requirements.md)
# Acesso no código: env.r2_binding.put() / env.r2_binding.get()
# Estrutura: products/[id]/, portfolio/[id]/
[[r2_buckets]]
binding = "r2_binding"
bucket_name = "tomasa-media"
